<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .card { fill: #161b22; rx: 8; }
      .title { font-family: 'Segoe UI', sans-serif; font-size: 11px; fill: #8b949e; font-weight: 600; letter-spacing: 0.05em; }
      .value { font-family: 'Segoe UI', sans-serif; font-size: 22px; fill: #e6edf3; font-weight: 700; }
      .label { font-family: 'Segoe UI', sans-serif; font-size: 10px; fill: #8b949e; }
      .sublabel { font-family: 'Segoe UI', sans-serif; font-size: 9px; fill: #6e7681; }

      /* BAR GROW ANIMATIONS */
      @keyframes growB1 { from { height: 0; y: 245; } to { height: 80; y: 165; } }
      @keyframes growB2 { from { height: 0; y: 245; } to { height: 110; y: 135; } }
      @keyframes growB3 { from { height: 0; y: 245; } to { height: 60; y: 185; } }
      @keyframes growB4 { from { height: 0; y: 245; } to { height: 130; y: 115; } }
      @keyframes growB5 { from { height: 0; y: 245; } to { height: 95; y: 150; } }
      @keyframes growB6 { from { height: 0; y: 245; } to { height: 150; y: 95; } }

      .b1 { animation: growB1 1.2s ease-out 0.1s both; }
      .b2 { animation: growB2 1.2s ease-out 0.25s both; }
      .b3 { animation: growB3 1.2s ease-out 0.4s both; }
      .b4 { animation: growB4 1.2s ease-out 0.55s both; }
      .b5 { animation: growB5 1.2s ease-out 0.7s both; }
      .b6 { animation: growB6 1.2s ease-out 0.85s both; }

      /* LINE DRAW ANIMATION */
      @keyframes drawLine { from { stroke-dashoffset: 400; } to { stroke-dashoffset: 0; } }
      .line-path { stroke-dasharray: 400; animation: drawLine 2s ease-out 0.5s both; }

      /* PIE SPIN-IN */
      @keyframes spinIn { from { transform: rotate(-90deg) scale(0); opacity: 0; } to { transform: rotate(-90deg) scale(1); opacity: 1; } }
      .pie-group { transform-origin: 645px 200px; animation: spinIn 1s ease-out 0.3s both; }

      /* PIE SEGMENTS - stroke-dasharray trick */
      @keyframes pie1 { from { stroke-dasharray: 0 251; } to { stroke-dasharray: 88 163; } }
      @keyframes pie2 { from { stroke-dasharray: 0 251; stroke-dashoffset: -88; } to { stroke-dasharray: 63 188; stroke-dashoffset: -88; } }
      @keyframes pie3 { from { stroke-dasharray: 0 251; stroke-dashoffset: -151; } to { stroke-dasharray: 50 201; stroke-dashoffset: -151; } }
      @keyframes pie4 { from { stroke-dasharray: 0 251; stroke-dashoffset: -201; } to { stroke-dasharray: 50 201; stroke-dashoffset: -201; } }

      .seg1 { animation: pie1 1.2s ease-out 0.4s both; }
      .seg2 { animation: pie2 1.2s ease-out 0.6s both; }
      .seg3 { animation: pie3 1.2s ease-out 0.8s both; }
      .seg4 { animation: pie4 1.2s ease-out 1.0s both; }

      /* COUNTER FADE */
      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      .stat1 { animation: fadeUp 0.6s ease-out 0.2s both; }
      .stat2 { animation: fadeUp 0.6s ease-out 0.5s both; }
      .stat3 { animation: fadeUp 0.6s ease-out 0.8s both; }

      /* PULSE DOT */
      @keyframes pulse { 0%,100% { r: 4; opacity: 1; } 50% { r: 6; opacity: 0.6; } }
      .pulse-dot { animation: pulse 2s ease-in-out infinite; }

      /* GRID LINE FADE */
      @keyframes gridFade { from { opacity: 0; } to { opacity: 1; } }
      .grid-line { animation: gridFade 0.8s ease-out 0.1s both; }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="800" height="400" fill="#0d1117" rx="12"/>

  <!-- ═══ TOP STAT CARDS ═══ -->
  <!-- Card 1 -->
  <rect x="20" y="16" width="170" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <g class="stat1">
    <text x="36" y="38" class="title">RECORDS PROCESSED</text>
    <text x="36" y="64" class="value" fill="#1D9E75">100K+</text>
  </g>

  <!-- Card 2 -->
  <rect x="202" y="16" width="170" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <g class="stat2">
    <text x="218" y="38" class="title">ETL SPEED GAIN</text>
    <text x="218" y="64" class="value" fill="#378ADD">40%</text>
  </g>

  <!-- Card 3 -->
  <rect x="384" y="16" width="170" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <g class="stat3">
    <text x="400" y="38" class="title">THREAT LOOKUP FASTER</text>
    <text x="400" y="64" class="value" fill="#854F0B">~60%</text>
  </g>

  <!-- Card 4 -->
  <rect x="566" y="16" width="214" height="70" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <g class="stat1">
    <text x="582" y="38" class="title">EXPERIENCE</text>
    <text x="582" y="64" class="value" fill="#993C1D">3.5+ yrs</text>
  </g>

  <!-- ═══ BAR CHART ═══ -->
  <rect x="20" y="100" width="390" height="280" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="36" y="124" class="title">SKILLS PROFICIENCY</text>

  <!-- Grid lines -->
  <line x1="60" y1="245" x2="390" y2="245" stroke="#21262d" stroke-width="0.5" class="grid-line"/>
  <line x1="60" y1="215" x2="390" y2="215" stroke="#21262d" stroke-width="0.5" class="grid-line"/>
  <line x1="60" y1="185" x2="390" y2="185" stroke="#21262d" stroke-width="0.5" class="grid-line"/>
  <line x1="60" y1="155" x2="390" y2="155" stroke="#21262d" stroke-width="0.5" class="grid-line"/>
  <line x1="60" y1="125" x2="390" y2="125" stroke="#21262d" stroke-width="0.5" class="grid-line"/>

  <!-- Bars -->
  <rect class="b1" x="72"  y="165" width="36" height="80"  rx="4" fill="#1D9E75"/>
  <rect class="b2" x="120" y="135" width="36" height="110" rx="4" fill="#378ADD"/>
  <rect class="b3" x="168" y="185" width="36" height="60"  rx="4" fill="#854F0B"/>
  <rect class="b4" x="216" y="115" width="36" height="130" rx="4" fill="#993C1D"/>
  <rect class="b5" x="264" y="150" width="36" height="95"  rx="4" fill="#0F6E56"/>
  <rect class="b6" x="312" y="95"  width="36" height="150" rx="4" fill="#533AB7"/>

  <!-- Bar labels -->
  <text x="90"  y="262" class="sublabel" text-anchor="middle">Python</text>
  <text x="138" y="262" class="sublabel" text-anchor="middle">SQL</text>
  <text x="186" y="262" class="sublabel" text-anchor="middle">Tableau</text>
  <text x="234" y="262" class="sublabel" text-anchor="middle">Power BI</text>
  <text x="282" y="262" class="sublabel" text-anchor="middle">ELK</text>
  <text x="330" y="262" class="sublabel" text-anchor="middle">Plotly</text>

  <!-- Bar % labels -->
  <text x="90"  y="160" class="sublabel" text-anchor="middle" fill="#1D9E75">90%</text>
  <text x="138" y="130" class="sublabel" text-anchor="middle" fill="#378ADD">95%</text>
  <text x="186" y="180" class="sublabel" text-anchor="middle" fill="#854F0B">80%</text>
  <text x="234" y="110" class="sublabel" text-anchor="middle" fill="#993C1D">98%</text>
  <text x="282" y="145" class="sublabel" text-anchor="middle" fill="#0F6E56">85%</text>
  <text x="330" y="90"  class="sublabel" text-anchor="middle" fill="#533AB7">100%</text>

  <!-- ═══ LINE CHART ═══ -->
  <rect x="420" y="100" width="360" height="160" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="436" y="124" class="title">DATA INSIGHTS TREND</text>

  <!-- Grid -->
  <line x1="440" y1="145" x2="765" y2="145" stroke="#21262d" stroke-width="0.5"/>
  <line x1="440" y1="165" x2="765" y2="165" stroke="#21262d" stroke-width="0.5"/>
  <line x1="440" y1="185" x2="765" y2="185" stroke="#21262d" stroke-width="0.5"/>
  <line x1="440" y1="205" x2="765" y2="205" stroke="#21262d" stroke-width="0.5"/>
  <line x1="440" y1="225" x2="765" y2="225" stroke="#21262d" stroke-width="0.5"/>

  <!-- Line path -->
  <polyline class="line-path"
    points="445,220 500,205 545,195 590,175 630,160 670,148 715,138 760,128"
    fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Area fill under line -->
  <polygon
    points="445,220 500,205 545,195 590,175 630,160 670,148 715,138 760,128 760,240 445,240"
    fill="#1D9E75" fill-opacity="0.08"/>

  <!-- Dots on line -->
  <circle class="pulse-dot" cx="445" cy="220" r="4" fill="#1D9E75"/>
  <circle cx="500" cy="205" r="3.5" fill="#1D9E75"/>
  <circle cx="545" cy="195" r="3.5" fill="#1D9E75"/>
  <circle cx="590" cy="175" r="3.5" fill="#1D9E75"/>
  <circle cx="630" cy="160" r="3.5" fill="#1D9E75"/>
  <circle cx="670" cy="148" r="3.5" fill="#1D9E75"/>
  <circle cx="715" cy="138" r="3.5" fill="#1D9E75"/>
  <circle class="pulse-dot" cx="760" cy="128" r="4" fill="#1D9E75"/>

  <!-- Month labels -->
  <text x="445" y="252" class="sublabel" text-anchor="middle">Jan</text>
  <text x="500" y="252" class="sublabel" text-anchor="middle">Feb</text>
  <text x="545" y="252" class="sublabel" text-anchor="middle">Mar</text>
  <text x="590" y="252" class="sublabel" text-anchor="middle">Apr</text>
  <text x="630" y="252" class="sublabel" text-anchor="middle">May</text>
  <text x="670" y="252" class="sublabel" text-anchor="middle">Jun</text>
  <text x="715" y="252" class="sublabel" text-anchor="middle">Jul</text>
  <text x="760" y="252" class="sublabel" text-anchor="middle">Aug</text>

  <!-- ═══ PIE / DONUT CHART ═══ -->
  <rect x="420" y="272" width="360" height="108" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="436" y="296" class="title">ANALYTICS DOMAIN MIX</text>

  <!-- Donut chart using stroke-dasharray on circles (r=40, circumference=251) -->
  <g class="pie-group" transform="translate(0,0)">
    <!-- Base circle -->
    <circle cx="645" cy="330" r="32" fill="none" stroke="#21262d" stroke-width="18"/>
    <!-- Segment 1: BI Dashboards 35% -->
    <circle class="seg1" cx="645" cy="330" r="32" fill="none" stroke="#1D9E75" stroke-width="18"
      stroke-dasharray="88 163" stroke-dashoffset="0" transform="rotate(-90 645 330)"/>
    <!-- Segment 2: SQL Analytics 25% -->
    <circle class="seg2" cx="645" cy="330" r="32" fill="none" stroke="#378ADD" stroke-width="18"
      stroke-dasharray="63 188" stroke-dashoffset="-88" transform="rotate(-90 645 330)"/>
    <!-- Segment 3: Python/ETL 20% -->
    <circle class="seg3" cx="645" cy="330" r="32" fill="none" stroke="#854F0B" stroke-width="18"
      stroke-dasharray="50 201" stroke-dashoffset="-151" transform="rotate(-90 645 330)"/>
    <!-- Segment 4: Security 20% -->
    <circle class="seg4" cx="645" cy="330" r="32" fill="none" stroke="#993C1D" stroke-width="18"
      stroke-dasharray="50 201" stroke-dashoffset="-201" transform="rotate(-90 645 330)"/>
    <!-- Center hole label -->
    <circle cx="645" cy="330" r="20" fill="#161b22"/>
    <text x="645" y="327" class="sublabel" text-anchor="middle" fill="#e6edf3" font-size="10">Data</text>
    <text x="645" y="338" class="sublabel" text-anchor="middle" fill="#e6edf3" font-size="10">Mix</text>
  </g>

  <!-- Legend -->
  <rect x="440" y="310" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="455" y="320" class="sublabel">BI Dashboards 35%</text>
  <rect x="440" y="326" width="10" height="10" rx="2" fill="#378ADD"/>
  <text x="455" y="336" class="sublabel">SQL Analytics 25%</text>
  <rect x="440" y="342" width="10" height="10" rx="2" fill="#854F0B"/>
  <text x="455" y="352" class="sublabel">Python / ETL 20%</text>
  <rect x="440" y="358" width="10" height="10" rx="2" fill="#993C1D"/>
  <text x="455" y="368" class="sublabel">Security 20%</text>

  <!-- ═══ BOTTOM TAGLINE ═══ -->
  <text x="400" y="393" class="label" text-anchor="middle" fill="#30363d">Reshma Keshireddy · Data Analyst · BI · Python · SQL · Power BI · Security Analytics</text>
</svg>
